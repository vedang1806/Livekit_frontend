<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveKit Debugger — LSP Flow Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg0: #080810;
      --bg1: #0e0e1a;
      --bg2: #13131f;
      --bg3: #1a1a2e;
      --border: #1f1f38;
      --border2: #2a2a48;
      --accent: #6366f1;
      --accent-dim: #1a1a38;
      --accent-text: #a5b4fc;
      --green: #22c55e;
      --green-dim: #0c2218;
      --green-text: #86efac;
      --red: #ef4444;
      --red-dim: #2a0d0d;
      --red-text: #fca5a5;
      --amber: #f59e0b;
      --amber-dim: #261d08;
      --amber-text: #fcd34d;
      --text0: #f0f0ff;
      --text1: #9090b8;
      --text2: #55556a;
      --text3: #30303f;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    html, body { height: 100%; background: var(--bg0); color: var(--text0); font-family: var(--mono); font-size: 12px; overflow: hidden; }

    /* ── Layout ── */
    .shell { display: flex; height: 100vh; }
    .sidebar { width: 210px; background: var(--bg1); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* ── Sidebar ── */
    .s-header { padding: 16px 14px 12px; border-bottom: 1px solid var(--border); }
    .s-logo { font-size: 14px; font-weight: 700; color: var(--text0); letter-spacing: -.02em; }
    .s-sub { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .12em; margin-top: 3px; }

    .s-config { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .s-config-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
    .s-config input { width: 100%; background: var(--bg0); border: 1px solid var(--border); color: var(--text0); padding: 5px 8px; border-radius: 4px; font-family: var(--mono); font-size: 10px; outline: none; }
    .s-config input:focus { border-color: var(--accent); }
    .token-snip { font-size: 9px; color: var(--green-text); margin-top: 5px; word-break: break-all; line-height: 1.5; display: none; }

    nav { flex: 1; padding: 8px 6px; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 6px; cursor: pointer; background: none; border: none; color: var(--text1); width: 100%; text-align: left; font-family: var(--mono); font-size: 11px; transition: background .1s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--bg2); }
    .nav-item.active { background: var(--accent-dim); border: 1px solid var(--border2); color: var(--text0); }
    .nav-item.active .nav-step { background: var(--accent); color: #fff; }
    .nav-item.done .nav-step { background: var(--green-dim); color: var(--green-text); border: 1px solid #1a3d25; }
    .nav-step { width: 20px; height: 20px; border-radius: 4px; background: var(--bg3); color: var(--text2); font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
    .nav-label { font-weight: 500; font-size: 11px; }
    .nav-desc { font-size: 9px; color: var(--text2); margin-top: 1px; }

    .s-footer { padding: 10px 12px; border-top: 1px solid var(--border); }
    .s-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text2); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background .3s; }
    .dot.ok { background: var(--green); }
    .dot.err { background: var(--red); }
    .dot.warn { background: var(--amber); }

    /* ── Topbar ── */
    .topbar { padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--bg1); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-left .page-title { font-size: 13px; font-weight: 600; color: var(--text0); }
    .topbar-left .page-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .topbar-right { display: flex; gap: 6px; align-items: center; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Panels ── */
    .panel { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .panel-head { padding: 9px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .panel-title { font-size: 10px; font-weight: 500; color: var(--text1); text-transform: uppercase; letter-spacing: .1em; }
    .panel-body { padding: 14px; }

    /* ── Grid ── */
    .two-col { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 14px; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
    .field:last-child { margin-bottom: 0; }
    .field-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .1em; font-weight: 600; }
    .field input, .field select, .field textarea {
      background: var(--bg0); border: 1px solid var(--border); color: var(--text0);
      padding: 7px 9px; border-radius: 5px; font-family: var(--mono); font-size: 11px;
      outline: none; width: 100%; transition: border-color .12s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
    .field select option { background: var(--bg2); }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
    .btn { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 6px 13px; border-radius: 5px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text1); transition: all .12s; white-space: nowrap; }
    .btn:hover { background: var(--bg3); color: var(--text0); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-text); }
    .btn.primary:hover { background: var(--accent); color: #fff; }
    .btn.success { background: var(--green-dim); border-color: #1a3d25; color: var(--green-text); }
    .btn.success:hover { background: #16a34a; color: #fff; }
    .btn.danger { background: var(--red-dim); border-color: #3a1515; color: var(--red-text); }
    .btn.danger:hover { background: var(--red); color: #fff; }
    .btn.sm { padding: 4px 9px; font-size: 10px; }

    /* ── Response box ── */
    .resp-wrap { display: flex; flex-direction: column; gap: 6px; }
    .http-line { display: flex; align-items: center; gap: 7px; }
    .method { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; font-family: var(--mono); }
    .m-get { background: #1e3a5f; color: #93c5fd; }
    .m-post { background: #0f2e1a; color: #86efac; }
    .url-text { font-size: 10px; color: var(--text2); word-break: break-all; }
    .resp-box {
      background: var(--bg0); border: 1px solid var(--border); border-radius: 5px;
      padding: 10px 12px; min-height: 90px; max-height: 260px; overflow-y: auto;
      font-size: 11px; line-height: 1.7; color: var(--text1); white-space: pre-wrap; word-break: break-all;
    }
    .resp-box.ok { border-left: 2px solid var(--green); border-radius: 0 5px 5px 0; }
    .resp-box.err { border-left: 2px solid var(--red); border-radius: 0 5px 5px 0; }
    .resp-placeholder { color: var(--text3); font-style: italic; }

    /* ── KV table ── */
    .kv-table { display: flex; flex-direction: column; }
    .kv-row { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--bg3); }
    .kv-row:last-child { border-bottom: none; }
    .kv-key { font-size: 10px; color: var(--text2); flex-shrink: 0; }
    .kv-val { font-size: 11px; color: var(--text0); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
    .kv-val.hi { color: var(--accent-text); }
    .kv-val.ok { color: var(--green-text); }
    .kv-val.err { color: var(--red-text); }
    .kv-empty { font-size: 11px; color: var(--text3); font-style: italic; padding: 4px 0; }

    /* ── Badges ── */
    .badge { font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
    .badge-ok { background: var(--green-dim); color: var(--green-text); border: 1px solid #1a3d25; }
    .badge-err { background: var(--red-dim); color: var(--red-text); border: 1px solid #3a1515; }
    .badge-info { background: var(--accent-dim); color: var(--accent-text); border: 1px solid #2d2d52; }
    .badge-warn { background: var(--amber-dim); color: var(--amber-text); border: 1px solid #362808; }
    .badge-gray { background: var(--bg3); color: var(--text1); border: 1px solid var(--border); }

    /* ── Flow strip ── */
    .flow-strip { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
    .flow-box { padding: 4px 12px; border-radius: 4px; font-size: 10px; font-weight: 500; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); white-space: nowrap; }
    .flow-box.done { background: var(--green-dim); border-color: #1a3d25; color: var(--green-text); }
    .flow-box.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-text); }
    .flow-arr { color: var(--text3); font-size: 12px; }

    /* ── Warning box ── */
    .warn-box { background: var(--red-dim); border: 1px solid #3a1515; border-radius: 5px; padding: 9px 12px; font-size: 11px; color: var(--red-text); line-height: 1.6; margin-bottom: 12px; }

    /* ── Divider ── */
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 9px; color: var(--text3); }

    /* ── Log ── */
    .log-panel { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg1); }
    .log-bar { padding: 5px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .log-bar-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .1em; }
    #log-entries { height: 120px; overflow-y: auto; padding: 5px 14px; }
    .log-line { display: flex; gap: 9px; padding: 2px 0; border-bottom: 1px solid var(--bg2); font-size: 10px; line-height: 1.6; }
    .log-time { color: var(--text3); flex-shrink: 0; }
    .log-tag { flex-shrink: 0; width: 12px; }
    .log-ok .log-tag { color: var(--green); }
    .log-err .log-tag { color: var(--red); }
    .log-info .log-tag { color: var(--accent-text); }
    .log-warn .log-tag { color: var(--amber); }
    .log-msg { color: var(--text1); word-break: break-all; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    input::placeholder, textarea::placeholder { color: var(--text3); }
  </style>
</head>
<body>

<div class="shell">
  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <div class="s-header">
      <div class="s-logo">LiveKit Debug</div>
      <div class="s-sub">LSP Flow Tester</div>
    </div>

    <div class="s-config">
      <div class="s-config-label">API Base URL</div>
      <input id="cfg-api" value="http://localhost:8000/api" placeholder="http://…/api" />
      <div id="cfg-token-snip" class="token-snip"></div>
    </div>

    <nav id="nav">
      <button class="nav-item active" data-page="auth" onclick="goto('auth')">
        <div class="nav-step" id="step-auth">1</div>
        <div>
          <div class="nav-label">Auth</div>
          <div class="nav-desc">Login / Token</div>
        </div>
      </button>
      <button class="nav-item" data-page="room" onclick="goto('room')">
        <div class="nav-step" id="step-room">2</div>
        <div>
          <div class="nav-label">Create Room</div>
          <div class="nav-desc">POST /sessions/rooms</div>
        </div>
      </button>
      <button class="nav-item" data-page="join" onclick="goto('join')">
        <div class="nav-step" id="step-join">3</div>
        <div>
          <div class="nav-label">Join Room</div>
          <div class="nav-desc">POST /rooms/:name/join</div>
        </div>
      </button>
      <button class="nav-item" data-page="inspect" onclick="goto('inspect')">
        <div class="nav-step" id="step-inspect">4</div>
        <div>
          <div class="nav-label">Inspect</div>
          <div class="nav-desc">GET /rooms/:name</div>
        </div>
      </button>
      <button class="nav-item" data-page="stop" onclick="goto('stop')">
        <div class="nav-step" id="step-stop">5</div>
        <div>
          <div class="nav-label">Stop Session</div>
          <div class="nav-desc">POST /rooms/:name/stop</div>
        </div>
      </button>
      <div style="height:1px;background:var(--border);margin:4px 2px"></div>
      <button class="nav-item" onclick="openMeet()" style="margin-top:2px">
        <div class="nav-step" style="background:var(--green-dim);color:var(--green-text);border:1px solid #1a3d25">▶</div>
        <div>
          <div class="nav-label" style="color:var(--green-text)">Open Meet</div>
          <div class="nav-desc">Live video room</div>
        </div>
      </button>
    </nav>

    <div class="s-footer">
      <div class="s-status">
        <span class="dot" id="conn-dot"></span>
        <span id="conn-label">idle</span>
      </div>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="pg-title">Auth</div>
        <div class="page-sub" id="pg-sub">Authenticate to get a Bearer token</div>
      </div>
      <div class="topbar-right" id="topbar-badges">
        <span class="badge badge-gray" id="badge-auth">No token</span>
      </div>
    </div>

    <!-- Page content -->
    <div class="content" id="page-content"></div>

    <!-- Log -->
    <div class="log-panel">
      <div class="log-bar">
        <span class="log-bar-label">Event Log</span>
        <button class="btn sm" onclick="clearLog()">Clear</button>
      </div>
      <div id="log-entries">
        <div class="log-line log-info">
          <span class="log-time">--:--:--</span>
          <span class="log-tag">→</span>
          <span class="log-msg">Debug console ready — start with Auth</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  token: null,
  roomName: '',
  livekitUrl: '',
  joinToken: null,
  completedSteps: new Set(),
};

const PAGE_META = {
  auth:    { title: 'Auth',         sub: 'Authenticate to get a Bearer token' },
  room:    { title: 'Create Room',  sub: 'POST /api/sessions/rooms' },
  join:    { title: 'Join Room',    sub: 'POST /api/sessions/rooms/:name/join' },
  inspect: { title: 'Inspect Session', sub: 'GET /api/sessions/rooms/:name' },
  stop:    { title: 'Stop Session', sub: 'POST /api/sessions/rooms/:name/stop' },
};

// ─── Utils ────────────────────────────────────────────────────────────────────
const apiBase = () => document.getElementById('cfg-api').value.replace(/\/$/, '');
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function ts() {
  const d = new Date();
  return [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(n => String(n).padStart(2, '0')).join(':');
}

function log(msg, type = 'info') {
  const icons = { ok: '✓', err: '✗', info: '→', warn: '!' };
  const el = document.getElementById('log-entries');
  const line = document.createElement('div');
  line.className = `log-line log-${type}`;
  line.innerHTML = `<span class="log-time">${ts()}</span><span class="log-tag">${icons[type]}</span><span class="log-msg">${esc(msg)}</span>`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log-entries').innerHTML = '';
}

function setConnStatus(st) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  dot.className = `dot ${st === 'ok' ? 'ok' : st === 'err' ? 'err' : st === 'warn' ? 'warn' : ''}`;
  lbl.textContent = st;
}

function markDone(stepId) {
  S.completedSteps.add(stepId);
  const el = document.getElementById(stepId);
  if (!el) return;
  el.textContent = '✓';
  el.closest('.nav-item').classList.add('done');
}

// ─── API Fetch ────────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (S.token) opts.headers['Authorization'] = `Bearer ${S.token}`;
  if (body) opts.body = JSON.stringify(body);
  const url = apiBase() + path;
  log(`${method} ${url}`, 'info');
  const res = await fetch(url, opts);
  const json = await res.json();
  if (!res.ok) {
    const err = new Error(JSON.stringify(json));
    err.status = res.status;
    err.data = json;
    throw err;
  }
  return { status: res.status, data: json };
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function goto(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const btn = document.querySelector(`[data-page="${page}"]`);
  if (btn) btn.classList.add('active');
  const meta = PAGE_META[page];
  document.getElementById('pg-title').textContent = meta.title;
  document.getElementById('pg-sub').textContent = meta.sub;
  const renders = { auth: renderAuth, room: renderRoom, join: renderJoin, inspect: renderInspect, stop: renderStop };
  document.getElementById('page-content').innerHTML = renders[page]?.() || '';
}

// ─── Render: Auth ─────────────────────────────────────────────────────────────
function renderAuth() {
  return `
    <div class="two-col">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">OTP Login</span>
          <span class="badge badge-info">POST /auth/login + /auth/verify-otp</span>
        </div>
        <div class="panel-body">
          <div class="field"><div class="field-label">Email</div><input id="a-email" type="email" placeholder="you@hospital.org" /></div>
          <div class="btn-row" style="margin-top:0;margin-bottom:12px"><button class="btn success" onclick="doSendOtp()">Send OTP</button></div>
          <div class="field"><div class="field-label">OTP Code</div><input id="a-otp" placeholder="6-digit code" /></div>
          <div class="btn-row"><button class="btn primary" onclick="doVerifyOtp()">Verify &amp; Get Token</button></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="panel-title">Response</span></div>
        <div class="panel-body">
          <div class="resp-wrap">
            <div class="http-line">
              <span class="method m-post">POST</span>
              <span class="url-text">/auth/login → /auth/verify-otp</span>
            </div>
            <div class="resp-box" id="resp-auth"><span class="resp-placeholder">Waiting for response…</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"><div class="divider-line"></div><span class="divider-text">OR PASTE TOKEN DIRECTLY</span><div class="divider-line"></div></div>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Manual Token</span>
        <span style="font-size:10px;color:var(--text2)">Copy from Swagger /docs → Authorize</span>
      </div>
      <div class="panel-body">
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div class="field" style="flex:1;margin-bottom:0">
            <div class="field-label">Bearer Token</div>
            <input id="a-manual" placeholder="eyJhbGciOiJIUzI1NiIs…" />
          </div>
          <button class="btn primary" onclick="doManualToken()">Use Token</button>
        </div>
      </div>
    </div>`;
}

// ─── Render: Room ─────────────────────────────────────────────────────────────
function renderRoom() {
  return `
    <div class="two-col">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Request</span>
          <span class="badge badge-info">POST /sessions/rooms</span>
        </div>
        <div class="panel-body">
          <div class="field">
            <div class="field-label">hipaa_baa_verified</div>
            <select id="r-hipaa"><option value="true">true</option><option value="false">false</option></select>
          </div>
          <div style="background:var(--bg0);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-size:10px;color:var(--text2);line-height:1.8;margin-bottom:12px">
            Creates a new LiveKit room on your backend and returns the room name + server URL needed for joining.
          </div>
          <div class="btn-row" style="margin-top:0"><button class="btn success" onclick="doCreateRoom()">Create Room</button></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Response</span>
          <span id="badge-room-status" class="badge badge-gray" style="display:none"></span>
        </div>
        <div class="panel-body">
          <div class="resp-wrap">
            <div class="http-line">
              <span class="method m-post">POST</span>
              <span class="url-text" id="room-url-text">${apiBase()}/sessions/rooms</span>
            </div>
            <div class="resp-box" id="resp-room"><span class="resp-placeholder">Waiting for response…</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Extracted Values</span><span style="font-size:10px;color:var(--text2)">Auto-fills into Join page</span></div>
      <div class="panel-body">
        <div class="kv-table" id="room-kv">
          <div class="kv-empty">Create a room to see extracted values here</div>
        </div>
      </div>
    </div>`;
}

// ─── Render: Join ─────────────────────────────────────────────────────────────
function renderJoin() {
  return `
    <div class="two-col">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Request Body</span>
          <span class="badge badge-info">POST /sessions/rooms/:name/join</span>
        </div>
        <div class="panel-body">
          <div class="field"><div class="field-label">Room Name</div><input id="j-room" value="${esc(S.roomName)}" placeholder="session-uuid" /></div>
          <div class="field"><div class="field-label">LiveKit Server URL</div><input id="j-lkurl" value="${esc(S.livekitUrl)}" placeholder="wss://your-livekit.server.io" /></div>
          <div class="field"><div class="field-label">Display Name</div><input id="j-name" value="Test User" /></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="field"><div class="field-label">Language (BCP-47)</div><input id="j-lang" value="en" /></div>
            <div class="field">
              <div class="field-label">Role</div>
              <select id="j-role">
                <option>doctor</option><option>patient</option>
                <option>interpreter</option><option>admin</option>
              </select>
            </div>
          </div>
          <div class="btn-row"><button class="btn success" onclick="doJoin()">Join Room</button></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="panel-title">Response</span></div>
        <div class="panel-body">
          <div class="resp-wrap">
            <div class="http-line">
              <span class="method m-post">POST</span>
              <span class="url-text" id="join-url-text">/sessions/rooms/…/join</span>
            </div>
            <div class="resp-box" id="resp-join"><span class="resp-placeholder">Waiting for response…</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">LiveKit Token</span>
        <span style="font-size:10px;color:var(--text2)">JWT returned by your backend — paste into jwt.io to inspect</span>
      </div>
      <div class="panel-body">
        <div class="resp-box" id="resp-join-token" style="min-height:44px"><span class="resp-placeholder">Token will appear here after joining</span></div>
      </div>

// ─── Render: Inspect ──────────────────────────────────────────────────────────
function renderInspect() {
  return `
    <div class="two-col">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Request</span>
          <span class="badge badge-info">GET /sessions/rooms/:name</span>
        </div>
        <div class="panel-body">
          <div class="field"><div class="field-label">Room Name</div><input id="i-room" value="${esc(S.roomName)}" placeholder="session-uuid" /></div>
          <div class="btn-row"><button class="btn primary" onclick="doInspect()">Fetch Session</button></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="panel-title">Raw Response</span></div>
        <div class="panel-body">
          <div class="resp-wrap">
            <div class="http-line">
              <span class="method m-get">GET</span>
              <span class="url-text" id="inspect-url-text">/sessions/rooms/…</span>
            </div>
            <div class="resp-box" id="resp-inspect"><span class="resp-placeholder">Waiting for response…</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Session Fields</span><span style="font-size:10px;color:var(--text2)">Active/connected values highlighted green</span></div>

        <div class="kv-table" id="inspect-kv">
          <div class="kv-empty">Fetch a session to see fields here</div>

// ─── Render: Stop ─────────────────────────────────────────────────────────────
function renderStop() {
  const flowSteps = ['auth', 'room', 'join', 'inspect', 'stop'];
  const flowLabels = { auth: 'Auth', room: 'Create Room', join: 'Join', inspect: 'Inspect', stop: 'Stop' };
  const flowHTML = flowSteps.map((s, i) =>
    `<div class="flow-box ${S.completedSteps.has('step-' + s) ? 'done' : ''}" id="fs-${s}">${flowLabels[s]}</div>${i < flowSteps.length - 1 ? '<span class="flow-arr">→</span>' : ''}`
  ).join('');

  return `
    <div class="two-col">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">End Session</span>
          <span class="badge badge-err">POST /sessions/rooms/:name/stop</span>
        </div>
        <div class="panel-body">
          <div class="field"><div class="field-label">Room Name</div><input id="s-room" value="${esc(S.roomName)}" placeholder="session-uuid" /></div>
          <div class="warn-box">⚠ This will kick all participants and permanently destroy the LiveKit room.</div>
          <div class="btn-row" style="margin-top:0"><button class="btn danger" onclick="doStop()">Stop Session</button></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><span class="panel-title">Response</span></div>
        <div class="panel-body">
          <div class="resp-wrap">
            <div class="http-line">
              <span class="method m-post">POST</span>
              <span class="url-text">/sessions/rooms/…/stop</span>
            </div>
            <div class="resp-box" id="resp-stop"><span class="resp-placeholder">Waiting for response…</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><span class="panel-title">Full Flow Status</span></div>
      <div class="panel-body">
        <div class="flow-strip">${flowHTML}</div>
      </div>
    </div>`;
}

// ─── Handlers ─────────────────────────────────────────────────────────────────
function setToken(t) {
  S.token = t;
  document.getElementById('cfg-token-snip').textContent = t.slice(0, 30) + '…';
  document.getElementById('cfg-token-snip').style.display = 'block';
  const badge = document.getElementById('badge-auth');
  badge.textContent = 'Authenticated';
  badge.className = 'badge badge-ok';
  markDone('step-auth');
  setConnStatus('ok');
}

async function doSendOtp() {
  const email = document.getElementById('a-email')?.value.trim();
  if (!email) { log('Enter email address', 'warn'); return; }
  try {
    const r = await apiFetch('/auth/login', 'POST', { email });
    document.getElementById('resp-auth').textContent = JSON.stringify(r.data, null, 2);
    document.getElementById('resp-auth').className = 'resp-box ok';
    log(`OTP sent to ${email}`, 'ok');
  } catch(e) {
    document.getElementById('resp-auth').textContent = JSON.stringify(e.data || e.message, null, 2);
    document.getElementById('resp-auth').className = 'resp-box err';
    log(`sendOtp: ${e.message}`, 'err');
  }
}

async function doVerifyOtp() {
  const email = document.getElementById('a-email')?.value.trim();
  const otp   = document.getElementById('a-otp')?.value.trim();
  if (!email || !otp) { log('Enter both email and OTP', 'warn'); return; }
  try {
    const r = await apiFetch('/auth/verify-otp', 'POST', { email, otp });
    const t = r.data?.data?.access_token || r.data?.access_token;
    document.getElementById('resp-auth').textContent = JSON.stringify(r.data, null, 2);
    document.getElementById('resp-auth').className = 'resp-box ok';
    if (t) { setToken(t); log('Authenticated via OTP', 'ok'); }
    else    { log('Token not found in response — check response shape', 'warn'); }
  } catch(e) {
    document.getElementById('resp-auth').textContent = JSON.stringify(e.data || e.message, null, 2);
    document.getElementById('resp-auth').className = 'resp-box err';
    log(`verifyOtp: ${e.message}`, 'err');
    setConnStatus('err');
  }
}

function doManualToken() {
  const t = document.getElementById('a-manual')?.value.trim();
  if (!t) { log('Paste a token first', 'warn'); return; }
  setToken(t);
  log('Token set manually', 'ok');
}

async function doCreateRoom() {
  if (!S.token) { log('Authenticate first', 'warn'); return; }
  const hipaa = document.getElementById('r-hipaa')?.value === 'true';
  document.getElementById('room-url-text').textContent = apiBase() + '/sessions/rooms';
  try {
    const r = await apiFetch('/sessions/rooms', 'POST', { hipaa_baa_verified: hipaa });
    const d = r.data?.data || r.data;
    S.roomName = d.livekit_room_name || d.room_name || '';
    S.livekitUrl = d.livekit_server_url || '';
    document.getElementById('resp-room').textContent = JSON.stringify(d, null, 2);
    document.getElementById('resp-room').className = 'resp-box ok';
    const sb = document.getElementById('badge-room-status');
    sb.textContent = r.status + ' OK'; sb.className = 'badge badge-ok'; sb.style.display = '';
    // KV
    const kv = document.getElementById('room-kv');
    if (kv && S.roomName) {
      kv.innerHTML = kvRow('livekit_room_name', S.roomName, 'hi')
        + kvRow('livekit_server_url', S.livekitUrl || '—')
        + kvRow('status', d.status || '—', d.status === 'active' ? 'ok' : '')
        + kvRow('id', d.id || '—');
    }
    markDone('step-room');
    // Live-patch any visible room-name / url inputs on other pages
    ['j-room', 'i-room', 's-room'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = S.roomName;
    });
    const lkEl = document.getElementById('j-lkurl');
    if (lkEl) lkEl.value = S.livekitUrl;
    // Quick-nav button to jump to Join
    const btnRow = document.querySelector('#page-content .btn-row');
    if (btnRow && !document.getElementById('goto-join-btn')) {
      const btn = document.createElement('button');
      btn.id = 'goto-join-btn';
      btn.className = 'btn primary';
      btn.textContent = 'Go to Join →';
      btn.onclick = () => goto('join');
      btnRow.appendChild(btn);
    }
    log(`Room created: ${S.roomName}`, 'ok');
  } catch(e) {
    document.getElementById('resp-room').textContent = JSON.stringify(e.data || e.message, null, 2);
    document.getElementById('resp-room').className = 'resp-box err';
    log(`createRoom: ${e.message}`, 'err');
  }
}

async function doJoin() {
  if (!S.token) { log('Authenticate first', 'warn'); return; }
  const room    = document.getElementById('j-room')?.value.trim();
  const lkUrl   = document.getElementById('j-lkurl')?.value.trim();
  if (lkUrl) S.livekitUrl = lkUrl;
  const name = document.getElementById('j-name')?.value.trim();
  const lang = document.getElementById('j-lang')?.value.trim();
  const role = document.getElementById('j-role')?.value;
  if (!room) { log('Enter room name', 'warn'); return; }
  document.getElementById('join-url-text').textContent = `/sessions/rooms/${room}/join`;
  try {
    const r = await apiFetch(`/sessions/rooms/${room}/join`, 'POST', { role, display_name: name, language: lang });
    const d = r.data?.data || r.data;
    S.joinToken = d.livekit_token || '';
    document.getElementById('resp-join').textContent = JSON.stringify(d, null, 2);
    document.getElementById('resp-join').className = 'resp-box ok';
    document.getElementById('resp-join-token').textContent = S.joinToken || '(livekit_token not found in response)';
    document.getElementById('resp-join-token').className = 'resp-box ' + (S.joinToken ? 'ok' : 'err');
    markDone('step-join');
    log(`Join token received for ${role} — room: ${room}`, 'ok');
  } catch(e) {
    document.getElementById('resp-join').textContent = JSON.stringify(e.data || e.message, null, 2);
    document.getElementById('resp-join').className = 'resp-box err';
    log(`join: ${e.message}`, 'err');
  }
}

async function doInspect() {
  if (!S.token) { log('Authenticate first', 'warn'); return; }
  const room = document.getElementById('i-room')?.value.trim();
  if (!room) { log('Enter room name', 'warn'); return; }
  document.getElementById('inspect-url-text').textContent = `/sessions/rooms/${room}`;
  try {
    const r = await apiFetch(`/sessions/rooms/${room}`, 'GET');
    const d = r.data?.data || r.data;
    document.getElementById('resp-inspect').textContent = JSON.stringify(d, null, 2);
    document.getElementById('resp-inspect').className = 'resp-box ok';
    // Build KV
    const kv = document.getElementById('inspect-kv');
    if (kv && d && typeof d === 'object') {
      kv.innerHTML = flatKv(d).map(([k, v]) => {
        const low = String(v).toLowerCase();
        const cls = ['active','connected','running','true'].includes(low) ? 'ok'
                  : ['stopped','failed','error','false'].includes(low) ? 'err' : '';
        return kvRow(k, String(v), cls);
      }).join('');
    }
    markDone('step-inspect');
    log(`Session fetched: ${room}`, 'ok');
  } catch(e) {
    document.getElementById('resp-inspect').textContent = JSON.stringify(e.data || e.message, null, 2);
    document.getElementById('resp-inspect').className = 'resp-box err';
    log(`getSession: ${e.message}`, 'err');
  }
}

async function doStop() {
  if (!S.token) { log('Authenticate first', 'warn'); return; }
  const room = document.getElementById('s-room')?.value.trim();
  if (!room) { log('Enter room name', 'warn'); return; }
  try {
    const r = await apiFetch(`/sessions/rooms/${room}/stop`, 'POST');
    const d = r.data?.data || r.data;
    document.getElementById('resp-stop').textContent = JSON.stringify(d, null, 2);
    document.getElementById('resp-stop').className = 'resp-box ok';
    const fs = document.getElementById('fs-stop');
    if (fs) fs.className = 'flow-box done';
    markDone('step-stop');
    setConnStatus('warn');
    log(`Session stopped: ${room}`, 'ok');
  } catch(e) {
    document.getElementById('resp-stop').textContent = JSON.stringify(e.data || e.message, null, 2);
    document.getElementById('resp-stop').className = 'resp-box err';
    log(`stopSession: ${e.message}`, 'err');
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function kvRow(key, val, cls = '') {
  return `<div class="kv-row"><span class="kv-key">${esc(key)}</span><span class="kv-val ${cls}">${esc(val)}</span></div>`;
}

function flatKv(obj, prefix = '') {
  const rows = [];
  for (const [k, v] of Object.entries(obj)) {
    const key = prefix ? `${prefix}.${k}` : k;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
      rows.push(...flatKv(v, key));
    } else {
      rows.push([key, Array.isArray(v) ? JSON.stringify(v) : v]);
    }
  }
  return rows;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
function openMeet() {
  sessionStorage.setItem('lk_token',    S.joinToken  || '');
  sessionStorage.setItem('lk_url',      S.livekitUrl || '');
  sessionStorage.setItem('lk_room',     S.roomName   || '');
  sessionStorage.setItem('api_token',   S.token      || '');
  sessionStorage.setItem('lk_api_base', apiBase());
  if (!S.joinToken) log('No LiveKit token — complete the Join step first', 'warn');
  window.open('/meet.html', '_blank');
}

goto('auth');
</script>
